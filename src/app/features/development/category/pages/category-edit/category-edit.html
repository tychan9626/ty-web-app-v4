<ng-template #editActions>
  <div class="page-toolbar-wrapper">
    <div class="left-actions">
      <button mat-icon-button routerLink="/development/category/list">
        <mat-icon>west</mat-icon>
      </button>
    </div>

    <div class="right-actions">
      @if (currentId) {
        <button
          mat-button
          color="warn"
          (click)="onDelete()"
          [disabled]="categoryService.loading()"
        >
          <mat-icon>delete_outline</mat-icon>
          <span>Delete</span>
        </button>
      }
      <button
        mat-flat-button
        color="primary"
        (click)="onSave()"
        [disabled]="categoryService.loading()"
      >
        <mat-icon>{{
          categoryService.loading() ? "hourglass_empty" : "check"
        }}</mat-icon>
        <span>{{ currentId ? "Save Changes" : "Create Category" }}</span>
      </button>
    </div>
  </div>
</ng-template>

<div class="split-workspace">
  @if (item(); as c) {
    <div class="form-scroll-area">
      <section class="form-group">
        <h3 class="group-header">Identity & Naming</h3>
        <div class="fields-grid-2">
          <mat-form-field
            appearance="outline"
            class="full-width"
            subscriptSizing="dynamic"
          >
            <mat-label>Display Name</mat-label>
            <input matInput [(ngModel)]="c.display_name" required />
          </mat-form-field>

          <mat-form-field appearance="outline" subscriptSizing="dynamic">
            <mat-label>English Name</mat-label>
            <input matInput [(ngModel)]="c.name_en" />
          </mat-form-field>

          <mat-form-field appearance="outline" subscriptSizing="dynamic">
            <mat-label>Chinese Name</mat-label>
            <input matInput [(ngModel)]="c.name_zh" />
          </mat-form-field>
        </div>
      </section>

      <section class="form-group">
        <h3 class="group-header">System Configuration</h3>
        <div class="fields-row-2">
          <mat-form-field appearance="outline" subscriptSizing="dynamic">
            <mat-label>Status</mat-label>
            <mat-select [(ngModel)]="c.status">
              <mat-option [value]="1">Active</mat-option>
              <mat-option [value]="0">Inactive</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <mat-form-field
          appearance="outline"
          class="full-width"
          subscriptSizing="dynamic"
        >
          <mat-label>Internal Remarks</mat-label>
          <textarea matInput rows="4" [(ngModel)]="c.remarks"></textarea>
        </mat-form-field>
      </section>
    </div>
  }
</div>
