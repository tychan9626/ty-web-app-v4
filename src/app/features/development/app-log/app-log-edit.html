<div class="page-container">
  <h2>{{ isEditMode ? "Edit Log" : "Create New Log" }}</h2>

  <form [formGroup]="logForm" (ngSubmit)="onSubmit()" class="form-container">
    <div class="form-row flex-gap">
      <div class="form-group">
        <label for="version_major"
          >Major Version <span class="text-danger">*</span></label
        >
        <input
          id="version_major"
          type="number"
          formControlName="version_major"
          class="form-control"
        />
      </div>
      <div class="form-group">
        <label for="version_minor"
          >Minor Version <span class="text-danger">*</span></label
        >
        <input
          id="version_minor"
          type="number"
          formControlName="version_minor"
          class="form-control"
        />
      </div>
      <div class="form-group">
        <label for="version_patch"
          >Patch Version <span class="text-danger">*</span></label
        >
        <input
          id="version_patch"
          type="number"
          formControlName="version_patch"
          class="form-control"
        />
      </div>
    </div>

    <div class="form-group">
      <label for="version_date"
        >Version Date <span class="text-danger">*</span></label
      >
      <input
        id="version_date"
        type="date"
        formControlName="version_date"
        class="form-control"
      />
    </div>

    <div class="form-row flex-gap">
      <div class="form-group">
        <label for="category_id"
          >Category <span class="text-danger">*</span></label
        >
        <select
          id="category_id"
          formControlName="category_id"
          class="form-control"
        >
          <option value="" disabled>Select a category...</option>
          @for (
            category of appCategoryService.categories();
            track category.tb_tyapp_ap_ctgy_id
          ) {
            <option [value]="category.tb_tyapp_ap_ctgy_id">
              {{ category.display_name }}
            </option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="log_user"
          >User ID (UUID) <span class="text-danger">*</span></label
        >
        <input
          id="log_user"
          type="text"
          formControlName="log_user"
          class="form-control"
        />
      </div>
    </div>

    <div class="form-group">
      <label for="log_message"
        >Log Message <span class="text-danger">*</span></label
      >
      <textarea
        id="log_message"
        formControlName="log_message"
        class="form-control"
        rows="3"
      ></textarea>
    </div>

    <div class="form-group">
      <label for="remarks">Remarks</label>
      <textarea
        id="remarks"
        formControlName="remarks"
        class="form-control"
        rows="2"
      ></textarea>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" formControlName="status" class="form-control">
        <option [ngValue]="1">Active (1)</option>
        <option [ngValue]="0">Inactive (0)</option>
      </select>
    </div>

    <div class="form-actions mt-4">
      <button type="button" routerLink="../" class="btn btn-outline">
        Cancel
      </button>
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="appLogService.loading() || logForm.invalid"
      >
        {{ appLogService.loading() ? "Saving..." : "Save" }}
      </button>
    </div>
  </form>
</div>
