<div class="user-list-view">
<header class="page-header">
    <div class="header-main">
      <h1>User Management</h1>
      <div class="meta-info">
        <span class="user-count" [class.hidden]="userService.loading()">
          {{ userService.users().length }} users total
        </span>
        
        @if (userService.loading()) {
          <div class="header-spinner">
            <mat-spinner diameter="16"></mat-spinner>
          </div>
        }
      </div>
    </div>
  </header>

  <div class="table-responsive-wrapper">
    <table mat-table [dataSource]="userService.users()" class="clean-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Identity</th>
        <td mat-cell *matCellDef="let user">
          <div class="user-cell">
            <span class="name-text">{{ user | tyDisplayName }}</span>
            <span class="id-text desktop-only">{{ user.user_id }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Access Level</th>
        <td mat-cell *matCellDef="let user">
          <span class="role-tag" [attr.data-role]="user.role">
            {{ user.role | tyRoleLabel }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let user" class="action-cell">
          <a class="edit-action" [routerLink]="['../edit', user.user_id]"
            >Manage</a
          >
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        class="user-row"
      ></tr>
    </table>
  </div>
</div>
