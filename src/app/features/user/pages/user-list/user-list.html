<ng-template #navActions>
  <div class="page-toolbar-wrapper">
    <div class="left-actions"></div>

    <div class="right-actions">
      <button
        matButton="elevated"
        (click)="onRefresh()"
        [disabled]="userService.loading()"
      >
        <mat-icon [class.spinning]="userService.loading()">refresh</mat-icon>
        <span>Refresh</span>
      </button>

      <button
        matButton="elevated"
        class="desktop-only"
        (click)="onExport()"
        [disabled]="userService.loading() || userService.users().length === 0"
      >
        <mat-icon>download</mat-icon>
        <span>Export CSV</span>
      </button>

      <div class="mobile-only">
        <button
          mat-icon-button
          [matMenuTriggerFor]="listMenu"
          [disabled]="userService.users().length === 0"
        >
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #listMenu="matMenu">
          <button mat-menu-item (click)="onExport()">
            <mat-icon>download</mat-icon>
            <span>Export CSV</span>
          </button>
        </mat-menu>
      </div>
    </div>
  </div>
</ng-template>

<div class="user-management-view">
  <div class="list-container">
    @for (user of userService.users(); track user.user_id) {
      <a class="user-item-link" [routerLink]="['../edit', user.user_id]">
        <div class="item-content">
          <div class="identity-group">
            <span class="name-text">{{ user | tyDisplayName }}</span>
            <span class="role-text">{{ user.role | tyRoleLabel }}</span>
            <span class="id-text">{{ user.user_id }}</span>
          </div>

          <div class="status-group">
            <mat-icon class="chevron">chevron_right</mat-icon>
          </div>
        </div>
      </a>
    } @empty {
      @if (!userService.loading()) {
        <div class="empty-placeholder">No users found.</div>
      }
    }
  </div>

  <footer
    class="list-footer"
    [hidden]="userService.loading() || userService.users().length === 0"
  >
    <div class="divider"></div>
    <span class="count-text"
      >TOTAL {{ userService.users().length }} MEMBERS</span
    >
    @if (userService.loading()) {
      <mat-spinner diameter="16"></mat-spinner>
    }
  </footer>
</div>
