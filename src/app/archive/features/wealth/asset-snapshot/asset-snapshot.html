<div class="list-container">
  @if (loading()) {
    <div class="loading-shade">
      <mat-spinner></mat-spinner>
    </div>
  }

  <div class="table-scroll">
    <table mat-table [dataSource]="snapshots()">
      <!-- Date Column -->
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let snap">{{ snap.snapshot_date }}</td>
      </ng-container>

      <!-- Institution Column -->
      <ng-container matColumnDef="institution">
        <th mat-header-cell *matHeaderCellDef>Institution</th>
        <td mat-cell *matCellDef="let snap">{{ snap.institution_name }}</td>
      </ng-container>

      <!-- Type Column -->
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let snap">{{ snap.asset_type }}</td>
      </ng-container>

      <!-- Value Column -->
      <ng-container matColumnDef="value">
        <th mat-header-cell *matHeaderCellDef>Value</th>
        <td mat-cell *matCellDef="let snap">
          {{ snap.snapshot_value | number: '1.2-2' }} {{ snap.currency }}
        </td>
      </ng-container>

      <!-- Reference Column -->
      <ng-container matColumnDef="reference">
        <th mat-header-cell *matHeaderCellDef>Reference</th>
        <td mat-cell *matCellDef="let snap">
          @if (snap.is_reference_only) {
            <mat-icon color="accent">check_circle</mat-icon>
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" [attr.colspan]="displayedColumns.length">
          No snapshots found.
        </td>
      </tr>
    </table>
  </div>
</div>
