<mat-sidenav-container class="layout-shell">
  <mat-sidenav #drawer class="sidebar"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()">
    
    <div class="sidebar-wrapper">
      <mat-toolbar class="sidebar-logo" routerLink="/welcome" style="cursor: pointer">
        <span>Jaxfr</span>
      </mat-toolbar>

      <nav class="nav-container">
        @if (isAdmin()) {
          <mat-accordion displayMode="flat">
            <mat-expansion-panel class="nav-panel" [expanded]="true">
              <mat-expansion-panel-header>
                <mat-panel-title>
                  <mat-icon>people_outline</mat-icon>
                  <span>User Management</span>
                </mat-panel-title>
              </mat-expansion-panel-header>
              
              <div class="sub-menu">
                <a mat-list-item routerLink="/users/list" routerLinkActive="active-sub-link" (click)="closeOnMobile()">
                  <span matListItemTitle>User List</span>
                </a>
              </div>
            </mat-expansion-panel>
          </mat-accordion>
        }

        <mat-accordion displayMode="flat">
          <mat-expansion-panel class="nav-panel">
            <mat-expansion-panel-header>
              <mat-panel-title>
                <mat-icon>settings</mat-icon>
                <span>System Settings</span>
              </mat-panel-title>
            </mat-expansion-panel-header>
            
            <div class="sub-menu">
              <a mat-list-item routerLink="/settings/general" routerLinkActive="active-sub-link" (click)="closeOnMobile()">
                <span matListItemTitle>General Settings</span>
              </a>
            </div>
          </mat-expansion-panel>
        </mat-accordion>
      </nav>
      
      <span class="spacer"></span>
      <div class="sidebar-footer">v1.0.0</div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="content-wrapper">
    <mat-toolbar class="dynamic-navbar">
      @if (isHandset()) {
        <button mat-icon-button (click)="drawer.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      
      <div class="header-portal-container">
        <span class="header-title">{{ headerService.title() }}</span>
        <div class="header-portal-slot">
          <ng-container [ngTemplateOutlet]="headerService.portal()"></ng-container>
        </div>
      </div>

      <span class="spacer"></span>

      <button mat-icon-button [matMenuTriggerFor]="userProfileMenu">
        <mat-icon>account_circle</mat-icon>
      </button>

      <mat-menu #userProfileMenu="matMenu" xPosition="before" class="jaxfr-menu">
  <div class="user-profile-section">
    <mat-icon class="profile-avatar">account_circle</mat-icon>
    <div class="profile-info">
      <div class="profile-name">{{ userProfile() | tyDisplayName }}</div>
      <div class="profile-role-tag">{{ userProfile()?.role | tyRoleLabel }}</div>
    </div>
  </div>
  
  <mat-divider></mat-divider>
  
  <button mat-menu-item (click)="onSignOut()" class="logout-item">
    <mat-icon>logout</mat-icon>
    <span>Sign Out</span>
  </button>
</mat-menu>
    </mat-toolbar>

    <main class="main-scroll-view">
      <div class="page-container">
        <router-outlet></router-outlet>
      </div>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
