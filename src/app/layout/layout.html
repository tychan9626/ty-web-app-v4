<mat-sidenav-container class="layout-shell">
  <mat-sidenav
    #drawer
    class="sidebar"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
  >
    <div class="sidebar-wrapper">
      <mat-toolbar class="sidebar-logo" routerLink="/welcome">
        <span>Jaxfr</span>
      </mat-toolbar>

      <div class="sidebar-user-profile">
        <mat-icon class="avatar">account_circle</mat-icon>
        <div class="info">
          <span class="name">{{ userProfile() | tyDisplayName }}</span>
          <span class="role">{{ userProfile()?.role | tyRoleLabel }}</span>
        </div>
      </div>

      <nav class="nav-container">
        @if (isAdmin()) {
          <mat-accordion displayMode="flat">
            <mat-expansion-panel class="nav-panel" [expanded]="true">
              <mat-expansion-panel-header>
                <mat-panel-title>
                  <mat-icon>people_outline</mat-icon>
                  <span>User Management</span>
                </mat-panel-title>
              </mat-expansion-panel-header>
              <div class="sub-menu">
                <a
                  mat-list-item
                  routerLink="/users/list"
                  routerLinkActive="active-sub-link"
                  (click)="closeOnMobile()"
                >
                  <span matListItemTitle>User List</span>
                </a>
              </div>
            </mat-expansion-panel>
          </mat-accordion>

          <mat-accordion displayMode="flat">
            <mat-expansion-panel class="nav-panel" [expanded]="true">
              <mat-expansion-panel-header>
                <mat-panel-title>
                  <mat-icon>code</mat-icon>
                  <span>Development</span>
                </mat-panel-title>
              </mat-expansion-panel-header>
              <div class="sub-menu">
                <a
                  mat-list-item
                  routerLink="/development/category/list"
                  routerLinkActive="active-sub-link"
                  (click)="closeOnMobile()"
                >
                  <span matListItemTitle>App Categories</span>
                </a>
                </div>
            </mat-expansion-panel>
          </mat-accordion>
        }

        <mat-accordion displayMode="flat">
          <mat-expansion-panel class="nav-panel" [expanded]="true">
            <mat-expansion-panel-header>
              <mat-panel-title>
                <mat-icon>settings</mat-icon>
                <span>System Settings</span>
              </mat-panel-title>
            </mat-expansion-panel-header>
            <div class="sub-menu">
              <a
                mat-list-item
                routerLink="/settings/general"
                routerLinkActive="active-sub-link"
                (click)="closeOnMobile()"
              >
                <span matListItemTitle>General Settings</span>
              </a>
            </div>
          </mat-expansion-panel>
        </mat-accordion>
      </nav>

      <span class="spacer"></span>

      <button mat-button class="sidebar-logout" (click)="onSignOut()">
        <mat-icon>logout</mat-icon>
        <span>Sign Out</span>
      </button>
      <div class="sidebar-footer">App Version: {{ appVersion() }}</div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="content-wrapper">
    <mat-toolbar class="dynamic-navbar">
      <div class="nav-slot">
        @if (isHandset()) {
          <button mat-icon-button (click)="drawer.toggle()">
            <mat-icon>menu</mat-icon>
          </button>
        }
      </div>

      <div class="header-portal-slot">
        <ng-container
          [ngTemplateOutlet]="headerService.portal()"
        ></ng-container>
      </div>
    </mat-toolbar>

    <main class="main-scroll-view">
      <div class="page-container">
        <router-outlet></router-outlet>
      </div>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
