<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav"
    fixedInViewport
    [attr.role]="isHandset() ? 'dialog' : 'navigation'"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
  >
    <mat-toolbar>
      <span routerLink="/welcome" style="cursor: pointer">Jaxfr</span>
    </mat-toolbar>

    <mat-nav-list>
      <mat-accordion displayMode="flat">
        <mat-expansion-panel class="mat-elevation-z0">
          <mat-expansion-panel-header collapsedHeight="48px" expandedHeight="48px">
            <mat-panel-title style="display: flex; align-items: center; gap: 8px">
              <mat-icon>people</mat-icon>
              <span>User Management</span>
            </mat-panel-title>
          </mat-expansion-panel-header>

          <mat-nav-list class="sub-menu">
            <a mat-list-item routerLink="/users/list">
              <span matListItemTitle>User List</span>
            </a>
            <a mat-list-item routerLink="/users/roles">
              <span matListItemTitle>Roles & Permissions</span>
            </a>
          </mat-nav-list>
        </mat-expansion-panel>
      </mat-accordion>

      <mat-accordion displayMode="flat">
        <mat-expansion-panel class="mat-elevation-z0">
          <mat-expansion-panel-header collapsedHeight="48px" expandedHeight="48px">
            <mat-panel-title style="display: flex; align-items: center; gap: 8px">
              <mat-icon>settings</mat-icon>
              <span>System Settings</span>
            </mat-panel-title>
          </mat-expansion-panel-header>

          <mat-nav-list class="sub-menu">
            <a mat-list-item routerLink="/settings/general">
              <span matListItemTitle>General Settings</span>
            </a>
          </mat-nav-list>
        </mat-expansion-panel>
      </mat-accordion>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      @if (isHandset()) {
        <button
          type="button"
          mat-icon-button
          (click)="drawer.toggle()"
        >
          <mat-icon>menu</mat-icon>
        </button>
      }

      <div class="toolbar-dynamic-actions"></div>
      <span class="spacer"></span>

      <button
        mat-icon-button
        [matMenuTriggerFor]="userProfileMenu"
        class="user-profile-btn"
      >
        <mat-icon class="avatar-icon">account_circle</mat-icon>
      </button>

      <mat-menu #userProfileMenu="matMenu" xPosition="before">
        <div class="menu-user-info">
          <span class="info-name">{{ displayName() }}</span>
          <span class="info-role">{{ displayRole() }}</span>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item>
          <mat-icon>person</mat-icon>
          <span>My Profile</span>
        </button>
        <button mat-menu-item (click)="onSignOut()">
          <mat-icon>logout</mat-icon>
          <span>Sign Out</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="p-4">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
